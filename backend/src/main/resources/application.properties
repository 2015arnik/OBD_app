spring.application.name=OBD

spring.profiles.default=postgres

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

app.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-make-it-at-least-32-bytes-long-000}
app.jwt.expiration-hours=72

app.reminder.days-before=7
app.fundraiser.days-before=3

server.port=${PORT:8080}

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:*}

server.error.include-message=always
server.error.include-binding-errors=always
