spring.application.name=OBD

spring.datasource.url=jdbc:h2:mem:obd;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true

app.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-make-it-at-least-32-bytes-long-000}
app.jwt.expiration-hours=72

app.reminder.days-before=7
app.fundraiser.days-before=3

server.port=8080
