spring.application.name=OBD

# ---- H2 in-memory database (demo). In production switch these to PostgreSQL. ----
spring.datasource.url=jdbc:h2:mem:obd;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 web console -> http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:obd)
spring.h2.console.enabled=true

# ---- JWT ----
# In production, pass a long random secret via the JWT_SECRET environment variable.
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-make-it-at-least-32-bytes-long-000}
app.jwt.expiration-hours=72

# ---- Business rules ----
app.reminder.days-before=7
app.fundraiser.days-before=3

server.port=8080
